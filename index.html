// ─── OLL Pattern Helpers ─────────────────────────────────────────────────────
// Each OLL pattern is stored as a 21-char string of Y/G:
//   positions 0-8: U face (top-down, reading order)
//   positions 9-11: F strip (L→R)
//   positions 12-14: B strip (L→R in top-down view)
//   positions 15-17: L strip (back→front)
//   positions 18-20: R strip (back→front)
// Center (position 4) is always yellow.

const BLANK_PATTERN = "YYYYYYYYYGGGGGGGGGGGG";

function patternToData(pat) {
const s = pat || BLANK_PATTERN;
return {
top: s.slice(0,9).split(''),
sides: {
F: s.slice(9,12).split(''),
B: s.slice(12,15).split(''),
L: s.slice(15,18).split(''),
R: s.slice(18,21).split(''),
},
};
}

function dataToPattern(data) {
return data.top.join('') + data.sides.F.join('') + data.sides.B.join('') + data.sides.L.join('') + data.sides.R.join('');
}

function validatePattern(pat) {
const d = patternToData(pat);
const all = [...d.top, ...d.sides.F, ...d.sides.B, ...d.sides.L, ...d.sides.R];
const total = all.filter(v => v === "Y").length;
const edges = [
[d.top[1], d.sides.B[1]],
[d.top[3], d.sides.L[1]],
[d.top[5], d.sides.R[1]],
[d.top[7], d.sides.F[1]],
];
const corners = [
[d.top[0], d.sides.B[0], d.sides.L[0]],
[d.top[2], d.sides.B[2], d.sides.R[0]],
[d.top[6], d.sides.F[0], d.sides.L[2]],
[d.top[8], d.sides.F[2], d.sides.R[2]],
];
const edgesOk = edges.every(e => e.filter(v => v==="Y").length === 1);
const cornersOk = corners.every(c => c.filter(v => v==="Y").length === 1);
return { total, edgesOk, cornersOk, valid: total === 9 && edgesOk && cornersOk };
}

// ─── SVG OLL Diagram ─────────────────────────────────────────────────────────
const CELL = 18;
const GAP = 2;
const SIDE_H = 10;
const PAD = 6;

function OLLDiagram({ data, size = 120, onToggle }) {
if (!data) return <FallbackDiagram label="?" size={size} />;

const gridW = 3 * CELL + 2 * GAP;
const totalW = gridW + 2 * PAD + 2 * SIDE_H;
const totalH = gridW + 2 * PAD + 2 * SIDE_H;

const offsetX = PAD + SIDE_H;
const offsetY = PAD + SIDE_H;

const cellX = (col) => offsetX + col * (CELL + GAP);
const cellY = (row) => offsetY + row * (CELL + GAP);

const fillColor = (v) => v === "Y" ? "#facc15" : "#374151";
const borderColor = (v) => v === "Y" ? "#ca8a04" : "#1f2937";

const handleClick = (idx) => { if (onToggle && idx !== 4) onToggle(idx); };
const cursor = onToggle ? "pointer" : "default";

return (
<svg width={size} height={size} viewBox={`0 0 ${totalW} ${totalH}`} style={{ display: "block" }}>
<rect width={totalW} height={totalH} fill="#0f172a" rx="6" />
{/* Top face 3x3 */}
{data.top.map((v, i) => {
const col = i % 3;
const row = Math.floor(i / 3);
return (
<rect key={i} x={cellX(col)} y={cellY(row)} width={CELL} height={CELL}
fill={fillColor(v)} stroke={borderColor(v)} strokeWidth="0.8" rx="2"
style={{ cursor: i === 4 ? "default" : cursor }} onClick={() => handleClick(i)} />
);
})}
{/* Front strip (bottom) */}
{data.sides.F && data.sides.F.map((v, i) => (
<rect key={`F${i}`} x={cellX(i)} y={offsetY + gridW + GAP} width={CELL} height={SIDE_H}
fill={fillColor(v)} stroke={borderColor(v)} strokeWidth="0.8" rx="1.5"
style={{ cursor }} onClick={() => handleClick(9 + i)} />
))}
{/* Back strip (top) */}
{data.sides.B && data.sides.B.map((v, i) => (
<rect key={`B${i}`} x={cellX(i)} y={PAD} width={CELL} height={SIDE_H}
fill={fillColor(v)} stroke={borderColor(v)} strokeWidth="0.8" rx="1.5"
style={{ cursor }} onClick={() => handleClick(12 + i)} />
))}
{/* Left strip */}
{data.sides.L && data.sides.L.map((v, i) => (
<rect key={`L${i}`} x={PAD} y={cellY(i)} width={SIDE_H} height={CELL}
fill={fillColor(v)} stroke={borderColor(v)} strokeWidth="0.8" rx="1.5"
style={{ cursor }} onClick={() => handleClick(15 + i)} />
))}
{/* Right strip */}
{data.sides.R && data.sides.R.map((v, i) => (
<rect key={`R${i}`} x={offsetX + gridW + GAP} y={cellY(i)} width={SIDE_H} height={CELL}
fill={fillColor(v)} stroke={borderColor(v)} strokeWidth="0.8" rx="1.5"
style={{ cursor }} onClick={() => handleClick(18 + i)} />
))}
{/* Centre dot */}
<circle cx={offsetX + CELL + GAP + CELL / 2} cy={offsetY + CELL + GAP + CELL / 2} r="2.5" fill="#a78bfa" opacity="0.8" />
</svg>
);
}

// ─── SVG PLL Diagram ─────────────────────────────────────────────────────────
const POS = {
TL:  { x: 14, y: 14 },
TC:  { x: 60, y: 8  },
TR:  { x: 106, y: 14 },
ML:  { x: 8,  y: 60 },
MR:  { x: 112, y: 60 },
BL:  { x: 14, y: 106 },
BC:  { x: 60, y: 112 },
BR:  { x: 106, y: 106 },
};

function arrowPath(from, to) {
const f = POS[from], t = POS[to];
if (!f || !t) return null;
const dx = t.x - f.x, dy = t.y - f.y;
const len = Math.sqrt(dx * dx + dy * dy);
const ux = dx / len, uy = dy / len;
const sx = f.x + ux * 10, sy = f.y + uy * 10;
const ex = t.x - ux * 10, ey = t.y - uy * 10;
// Slight curve
const mx = (sx + ex) / 2 - uy * 12;
const my = (sy + ey) / 2 + ux * 12;
return `M ${sx} ${sy} Q ${mx} ${my} ${ex} ${ey}`;
}

function PLLDiagram({ id, size = 120 }) {
const data = PLL_MAP[id];
if (!data) return <FallbackDiagram label={id} size={size} />;

const V = 120;
const CUBEPAD = 22;
const CS = (V - 2 * CUBEPAD) / 3;

const cornerPositions = [
{ key: "TL", cx: CUBEPAD, cy: CUBEPAD },
{ key: "TR", cx: CUBEPAD + CS * 2, cy: CUBEPAD },
{ key: "BL", cx: CUBEPAD, cy: CUBEPAD + CS * 2 },
{ key: "BR", cx: CUBEPAD + CS * 2, cy: CUBEPAD + CS * 2 },
];

const arrowColors = ["#f472b6","#38bdf8","#34d399","#fb923c","#a78bfa","#fbbf24"];

return (
<svg width={size} height={size} viewBox={`0 0 ${V} ${V}`} style={{ display: "block" }}>
<defs>
{arrowColors.map((c, i) => (
<marker key={i} id={`ah-${id}-${i}`} markerWidth="6" markerHeight="6"
refX="5" refY="3" orient="auto">
<path d="M0,0 L6,3 L0,6 Z" fill={c} />
</marker>
))}
</defs>
{/* Background */}
<rect width={V} height={V} fill="#0f172a" rx="6" />
{/* Cube face grid */}
{[0,1,2].map(row => [0,1,2].map(col => (
<rect key={`${row}-${col}`}
x={CUBEPAD + col * CS} y={CUBEPAD + row * CS}
width={CS} height={CS}
fill="rgba(255,255,255,0.05)"
stroke="rgba(255,255,255,0.15)" strokeWidth="0.8"
/>
)))}
{/* Corner squares */}
{cornerPositions.map(({ key, cx, cy }) => (
<rect key={key} x={cx} y={cy} width={CS} height={CS}
fill="rgba(167,139,250,0.15)" stroke="#a78bfa" strokeWidth="1.2" rx="2" />
))}
{/* Arrows */}
{data.arrows.map((arr, i) => {
const p = arrowPath(arr.from, arr.to);
if (!p) return null;
const col = arrowColors[i % arrowColors.length];
return (
<path key={i} d={p} fill="none" stroke={col} strokeWidth="1.8"
strokeLinecap="round"
markerEnd={`url(#ah-${id}-${i})`} opacity="0.9" />
);
})}
</svg>
);
}

function FallbackDiagram({ label, size }) {
return (
<svg width={size} height={size} viewBox="0 0 120 120">
<rect width="120" height="120" fill="#0f172a" rx="6" />
<text x="60" y="66" textAnchor="middle" fill="#475569" fontSize="11" fontFamily="monospace">{label}</text>
</svg>
);
}

const ALL_ALGS = [

const GROUP_COLORS = {
"Dot":"#6b7280","2 Edges":"#34d399","Square":"#fbbf24","Small L":"#60a5fa",
"Fish":"#ec4899","Knight Move":"#c084fc","Cross":"#22c55e","Sune":"#f59e0b",
"Arrow":"#06b6d4","P":"#84cc16","T":"#a78bfa","C":"#8b5cf6","W":"#f43f5e",
"Big L":"#fb923c","Awkward":"#f87171","All Edges":"#38bdf8","I":"#14b8a6",
"Edges Only":"#38bdf8","Corners Only":"#fb7185","Mixed":"#a3e635","G Perms":"#fcd34d",
};

const moveColor = (m) => {
if (m.includes("U")) return "#facc15";
if (m.includes("D")) return "#e2e8f0";
if (m.includes("R")) return "#ef4444";
if (m.includes("L")) return "#f97316";
if (m.includes("F")) return "#22c55e";
if (m.includes("B")) return "#3b82f6";
if (m.includes("M")||m.includes("r")||m.includes("l")) return "#a78bfa";
if (m.includes("x")||m.includes("y")||m.includes("z")) return "#6b7280";
return "#e2e8f0";
};

}

// ─── Main ─────────────────────────────────────────────────────────────────────
function SpeedcubingTrainer() {
const [view, setView] = useState("home");
const [filter, setFilter] = useState("ALL");
const [learned, setLearned] = useState({});
const [ollPatterns, setOllPatterns] = useState({});
const [loaded, setLoaded] = useState(false);
const [editOllId, setEditOllId] = useState(null);
const [queue, setQueue] = useState([]);
const [qIdx, setQIdx] = useState(0);
const [revealed, setRevealed] = useState(false);
const [quizPool, setQuizPool] = useState([]);
const [quizIdx, setQuizIdx] = useState(0);
const [quizRevealed, setQuizRevealed] = useState(false);
const [quizScore, setQuizScore] = useState({ correct:0, wrong:0 });
const [reviewFilter, setReviewFilter] = useState("ALL");
const [search, setSearch] = useState("");
const [toast, setToast] = useState(null);

useEffect(() => {
(async () => {
try {
const r1 = { value: localStorage.getItem("sc2_learned") };
if (r1 && r1.value) setLearned(JSON.parse(r1.value));
} catch {}
try {
const r2 = { value: localStorage.getItem("sc2_oll_patterns") };
if (r2 && r2.value) setOllPatterns(JSON.parse(r2.value));
} catch {}
setLoaded(true);
})();
}, []);

const persist = (next) => {
setLearned(next);
try { localStorage.setItem("sc2_learned", JSON.stringify(next)); } catch {}
};
const persistPatterns = (next) => {
setOllPatterns(next);
try { localStorage.setItem("sc2_oll_patterns", JSON.stringify(next)); } catch {}
};
const showToast = (msg, ok=true) => { setToast({msg,ok}); setTimeout(()=>setToast(null),2000); };

const learnedCount = Object.values(learned).filter(Boolean).length;
const ollLearned = OLL_ALGS.filter(a=>learned[a.id]).length;
const pllLearned = PLL_ALGS.filter(a=>learned[a.id]).length;

const startLearn = () => {
const pool = ALL_ALGS.filter(a=>(filter==="ALL"||a.type===filter)&&!learned[a.id]);
if (!pool.length) { showToast("All algorithms learned! 🎉"); return; }
setQueue(pool.slice(0,5)); setQIdx(0); setRevealed(false); setView("learn");
};
const startQuiz = () => {
const pool = ALL_ALGS.filter(a=>(filter==="ALL"||a.type===filter)&&learned[a.id]);
if (!pool.length) { showToast("Learn some algorithms first!", false); return; }
setQuizPool([...pool].sort(()=>Math.random()-0.5));
setQuizIdx(0); setQuizRevealed(false); setQuizScore({correct:0,wrong:0}); setView("quiz");
};
const markLearned = (id) => {
persist({...learned,[id]:true});
showToast("Marked as learned ✓");
if (qIdx+1>=queue.length) setView("done");
else { setQIdx(q=>q+1); setRevealed(false); }
};
const skipAlg = () => {
if (qIdx+1>=queue.length) setView("done");
else { setQIdx(q=>q+1); setRevealed(false); }
};
const quizAnswer = (correct) => {
setQuizScore(s=>correct?{...s,correct:s.correct+1}:{...s,wrong:s.wrong+1});
if (quizIdx+1>=quizPool.length) setView("quizDone");
else { setQuizIdx(i=>i+1); setQuizRevealed(false); }
};

const reviewAlgs = ALL_ALGS.filter(a=>{
if (reviewFilter==="OLL"&&a.type!=="OLL") return false;
if (reviewFilter==="PLL"&&a.type!=="PLL") return false;
if (reviewFilter==="LEARNED"&&!learned[a.id]) return false;
if (search && !a.name.toLowerCase().includes(search.toLowerCase()) &&
!a.alg.toLowerCase().includes(search.toLowerCase()) &&
!a.group.toLowerCase().includes(search.toLowerCase())) return false;
return true;
});

// ── EDIT OLL VIEW ──
if (view === "editOll" && editOllId) {
const ollAlg = OLL_ALGS.find(a => a.id === editOllId);
if (!ollAlg) { setView("review"); }
const gc = GROUP_COLORS[ollAlg?.group] || "#64748b";
const currentPat = ollPatterns[editOllId] || BLANK_PATTERN;
const currentData = patternToData(currentPat);
const validation = validatePattern(currentPat);
const hasPattern = currentPat !== BLANK_PATTERN;

// Edge pairs: [topIdx, sideIdx]
const edgePieces = [[1,13],[3,16],[5,19],[7,10]];
// Corner triples: [topIdx, sideA, sideB] — rotate order is top→A→B→top
const cornerPieces = [[0,12,15],[2,14,18],[6,9,17],[8,11,20]];
const edgeMap = {};
edgePieces.forEach(e => e.forEach(i => { edgeMap[i] = e; }));
const cornerMap = {};
cornerPieces.forEach(c => c.forEach(i => { cornerMap[i] = c; }));

const toggleSticker = (idx) => {
  const arr = currentPat.split('');
  if (idx === 4) return; // center always yellow
  if (edgeMap[idx]) {
    // Flip edge: swap Y between the two stickers
    const [a, b] = edgeMap[idx];
    const tmp = arr[a]; arr[a] = arr[b]; arr[b] = tmp;
  } else if (cornerMap[idx]) {
    // Rotate corner clockwise: Y moves to next position in cycle
    const [a, b, c] = cornerMap[idx];
    const tmp = arr[c]; arr[c] = arr[b]; arr[b] = arr[a]; arr[a] = tmp;
  }
  const newPat = arr.join('');
  persistPatterns({ ...ollPatterns, [editOllId]: newPat });
};

const resetPattern = () => {
  persistPatterns({ ...ollPatterns, [editOllId]: BLANK_PATTERN });
};

return (
  <div style={S.root}><Fonts/><div style={S.grid}/>
    {toast && <Toast {...toast}/>}
    <div style={S.wrap}>
      <NavBar onBack={() => setView("review")} title="Edit OLL Diagram"/>
      <div style={{...S.card, maxWidth:"520px", margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:"20px"}}>
          <div style={{fontSize:"1.5rem",fontWeight:900,marginBottom:"4px"}}>{ollAlg.name}</div>
          <div style={{display:"flex",gap:"6px",justifyContent:"center",marginBottom:"10px"}}>
            <span style={S.tag(gc)}>{ollAlg.group}</span>
            <span style={S.tag("#38bdf8")}>OLL</span>
          </div>
          <div style={{color:"#94a3b8",fontSize:"0.85rem"}}>{ollAlg.desc}</div>
        </div>

        <div style={{background:"rgba(0,0,0,0.25)",borderRadius:"12px",padding:"14px",marginBottom:"18px",border:"1px solid rgba(255,255,255,0.06)"}}>
          <AlgDisplay alg={ollAlg.alg}/>
        </div>

        <div style={{textAlign:"center",color:"#64748b",fontSize:"0.78rem",marginBottom:"12px",letterSpacing:"0.04em"}}>
          Tap edges to flip, corners to rotate
        </div>

        <div style={{display:"flex",justifyContent:"center",marginBottom:"20px"}}>
          <div style={{background:"rgba(0,0,0,0.3)",borderRadius:"16px",padding:"16px",border:"1px solid rgba(255,255,255,0.07)"}}>
            <OLLDiagram data={currentData} size={180} onToggle={toggleSticker} />
          </div>
        </div>

        {/* Validation feedback */}
        <div style={{
          background: validation.valid ? "rgba(34,197,94,0.08)" : "rgba(251,191,36,0.08)",
          border: `1px solid ${validation.valid ? "#22c55e33" : "#fbbf2433"}`,
          borderRadius:"10px", padding:"12px 16px", marginBottom:"18px",
        }}>
          <div style={{display:"flex",gap:"16px",justifyContent:"center",flexWrap:"wrap",fontSize:"0.82rem"}}>
            <span style={{color: validation.total === 9 ? "#22c55e" : "#fbbf24"}}>
              {validation.total === 9 ? "✓" : "✗"} Yellows: {validation.total}/9
            </span>
            <span style={{color: validation.edgesOk ? "#22c55e" : "#fbbf24"}}>
              {validation.edgesOk ? "✓" : "✗"} Edges
            </span>
            <span style={{color: validation.cornersOk ? "#22c55e" : "#fbbf24"}}>
              {validation.cornersOk ? "✓" : "✗"} Corners
            </span>
          </div>
          {!validation.valid && (
            <div style={{color:"#94a3b8",fontSize:"0.75rem",textAlign:"center",marginTop:"8px"}}>
              {validation.total !== 9 && `Need exactly 9 yellow stickers (have ${validation.total}). `}
              {!validation.edgesOk && "Each edge must have exactly 1 yellow. "}
              {!validation.cornersOk && "Each corner must have exactly 1 yellow."}
            </div>
          )}
        </div>

        <div style={{display:"flex",gap:"10px",justifyContent:"center"}}>
          <button style={S.primary} onClick={() => {
            if (validation.valid) {
              showToast("Pattern saved ✓");
              setView("review");
            } else {
              showToast("Pattern isn't valid yet — check constraints above", false);
            }
          }}>Done</button>
          <button style={S.btn("#f59e0b")} onClick={resetPattern}>Reset</button>
        </div>
      </div>
    </div>
  </div>
);

}

// ── LEARN VIEW ──
if (view==="learn" && queue[qIdx]) {
const alg = queue[qIdx];
const gc = GROUP_COLORS[alg.group]||"#64748b";
return (
<div style={S.root}>
<Fonts />
<div style={S.grid}/>
{toast && <Toast {...toast}/>}
<div style={S.wrap}>
<NavBar onBack={()=>setView("home")} title="Learn Mode"/>
<div style={{textAlign:"center",color:"#475569",fontSize:"0.85rem",marginBottom:"14px"}}>
Algorithm {qIdx+1} of {queue.length}
</div>
<div style={{...S.card, maxWidth:"640px", margin:"0 auto"}}>
<div style={{display:"flex",gap:"20px",alignItems:"flex-start",marginBottom:"22px",flexWrap:"wrap"}}>
{/* Diagram */}
<div style={{
background:"rgba(0,0,0,0.3)",borderRadius:"14px",padding:"12px",
border:"1px solid rgba(255,255,255,0.07)",flexShrink:0,
}}>
<CubeDiagram alg={alg} size={120} ollPatterns={ollPatterns}/>
<div style={{textAlign:"center",fontSize:"0.65rem",color:"#475569",marginTop:"6px",letterSpacing:"0.06em"}}>
{alg.type==="OLL"?"TOP VIEW":"TOP VIEW (ARROWS)"}
</div>
</div>
{/* Info */}
<div style={{flex:1,minWidth:"160px"}}>
<div style={{fontSize:"1.5rem",fontWeight:900,marginBottom:"6px"}}>{alg.name}</div>
<div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"10px"}}>
<span style={S.tag(gc)}>{alg.group}</span>
<span style={S.tag("#38bdf8")}>{alg.type}</span>
</div>
<div style={{color:"#94a3b8",fontSize:"0.875rem",lineHeight:1.6}}>{alg.desc}</div>
</div>
</div>

        <div style={{background:"rgba(0,0,0,0.25)",borderRadius:"12px",padding:"18px",marginBottom:"22px",border:"1px solid rgba(255,255,255,0.06)"}}>
          <div style={{color:"#475569",fontSize:"0.7rem",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"12px"}}>Algorithm</div>
          <AlgDisplay alg={alg.alg}/>
        </div>

        {!revealed ? (
          <div style={{textAlign:"center"}}>
            <button style={S.primary} onClick={()=>setRevealed(true)}>I've studied this →</button>
          </div>
        ) : (
          <div style={{display:"flex",gap:"10px",justifyContent:"center"}}>
            <button style={S.btn("#22c55e")} onClick={()=>markLearned(alg.id)}>✓ Got it!</button>
            <button style={S.btn("#f59e0b")} onClick={skipAlg}>Skip for now</button>
          </div>
        )}
      </div>
    </div>
  </div>
);

}

// ── QUIZ VIEW ──
if (view==="quiz" && quizPool[quizIdx]) {
const alg = quizPool[quizIdx];
const gc = GROUP_COLORS[alg.group]||"#64748b";
const pct = (quizIdx/quizPool.length)*100;
return (
<div style={S.root}>
<Fonts/>
<div style={S.grid}/>
<div style={S.wrap}>
<NavBar onBack={()=>setView("home")} title="Quiz Mode"/>
<div style={{display:"flex",gap:"12px",marginBottom:"14px",justifyContent:"center",fontSize:"0.875rem"}}>
<span style={{color:"#22c55e"}}>✓ {quizScore.correct}</span>
<span style={{color:"#475569"}}>·</span>
<span style={{color:"#f43f5e"}}>✗ {quizScore.wrong}</span>
<span style={{color:"#475569"}}>·</span>
<span style={{color:"#64748b"}}>{quizIdx}/{quizPool.length}</span>
</div>
<div style={{height:"6px",borderRadius:"3px",background:"rgba(255,255,255,0.07)",overflow:"hidden",marginBottom:"24px"}}>
<div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#a78bfa,#38bdf8)",transition:"width 0.4s"}}/>
</div>
<div style={{...S.card,maxWidth:"640px",margin:"0 auto"}}>
<div style={{display:"flex",gap:"20px",alignItems:"flex-start",marginBottom:"22px",flexWrap:"wrap"}}>
<div style={{background:"rgba(0,0,0,0.3)",borderRadius:"14px",padding:"12px",border:"1px solid rgba(255,255,255,0.07)",flexShrink:0}}>
<CubeDiagram alg={alg} size={120} ollPatterns={ollPatterns}/>
<div style={{textAlign:"center",fontSize:"0.65rem",color:"#475569",marginTop:"6px",letterSpacing:"0.06em"}}>
{alg.type==="OLL"?"TOP VIEW":"TOP VIEW (ARROWS)"}
</div>
</div>
<div style={{flex:1}}>
<div style={{color:"#64748b",fontSize:"0.72rem",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"6px"}}>What's the algorithm?</div>
<div style={{fontSize:"1.5rem",fontWeight:900,marginBottom:"8px"}}>{alg.name}</div>
<div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"10px"}}>
<span style={S.tag(gc)}>{alg.group}</span>
<span style={S.tag("#38bdf8")}>{alg.type}</span>
</div>
<div style={{color:"#94a3b8",fontSize:"0.85rem"}}>{alg.desc}</div>
</div>
</div>
{!quizRevealed ? (
<div style={{textAlign:"center"}}>
<button style={S.primary} onClick={()=>setQuizRevealed(true)}>Show Algorithm</button>
</div>
) : (
<>
<div style={{background:"rgba(0,0,0,0.25)",borderRadius:"12px",padding:"16px",marginBottom:"18px",border:"1px solid rgba(255,255,255,0.06)"}}>
<AlgDisplay alg={alg.alg}/>
</div>
<div style={{display:"flex",gap:"10px",justifyContent:"center"}}>
<button style={{...S.btn("#22c55e"),flex:1}} onClick={()=>quizAnswer(true)}>✓ Knew it</button>
<button style={{...S.btn("#f43f5e"),flex:1}} onClick={()=>quizAnswer(false)}>✗ Missed it</button>
</div>
</>
)}
</div>
</div>
</div>
);
}

// ── QUIZ DONE ──
if (view==="quizDone") {
const total = quizPool.length;
const pct = Math.round((quizScore.correct/total)*100);
return (
<div style={S.root}><Fonts/><div style={S.grid}/>
<div style={S.wrap}>
<NavBar onBack={()=>setView("home")} title="Results"/>
<div style={{...S.card,maxWidth:"420px",margin:"0 auto",textAlign:"center"}}>
<div style={{fontSize:"3.5rem",marginBottom:"14px"}}>{pct>=80?"🏆":pct>=50?"💪":"📚"}</div>
<div style={{fontSize:"3rem",fontWeight:900,background:"linear-gradient(135deg,#a78bfa,#38bdf8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{pct}%</div>
<div style={{color:"#94a3b8",marginBottom:"24px"}}>{quizScore.correct} correct out of {total}</div>
<div style={{display:"flex",gap:"10px",justifyContent:"center"}}>
<button style={S.primary} onClick={startQuiz}>Retry Quiz</button>
<button style={S.btn()} onClick={()=>setView("home")}>Home</button>
</div>
</div>
</div>
</div>
);
}

// ── DONE ──
if (view==="done") {
return (
<div style={S.root}><Fonts/><div style={S.grid}/>
<div style={S.wrap}>
<NavBar onBack={()=>setView("home")} title="Session Done"/>
<div style={{...S.card,maxWidth:"420px",margin:"0 auto",textAlign:"center"}}>
<div style={{fontSize:"3rem",marginBottom:"14px"}}>🔥</div>
<div style={{fontSize:"1.5rem",fontWeight:900,marginBottom:"8px"}}>Session Complete!</div>
<div style={{color:"#94a3b8",marginBottom:"24px"}}>Take a break, practise on your cube, then come back to quiz yourself.</div>
<div style={{display:"flex",gap:"10px",justifyContent:"center"}}>
<button style={S.primary} onClick={startLearn}>Learn More</button>
<button style={S.btn()} onClick={()=>setView("home")}>Home</button>
</div>
</div>
</div>
</div>
);
}

// ── REVIEW ──
if (view==="review") {
return (
<div style={S.root}><Fonts/><div style={S.grid}/>
<div style={S.wrap}>
<NavBar onBack={()=>setView("home")} title="Algorithm Library"/>
<div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"16px",alignItems:"center"}}>
{["ALL","OLL","PLL","LEARNED"].map(f=>(
<button key={f} onClick={()=>setReviewFilter(f)} style={{
...S.btn(reviewFilter===f?"#a78bfa":"#475569"),
background:reviewFilter===f?"rgba(167,139,250,0.18)":"rgba(255,255,255,0.03)",
}}>{f==="LEARNED"?"✓ Learned":f}</button>
))}
<input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{
flex:1,minWidth:"160px",background:"rgba(255,255,255,0.04)",
border:"1px solid rgba(255,255,255,0.09)",borderRadius:"10px",
padding:"9px 14px",color:"#e2e8f0",fontFamily:"'Syne',sans-serif",fontSize:"0.875rem",outline:"none",
}}/>
</div>
<div style={{color:"#475569",fontSize:"0.8rem",marginBottom:"14px"}}>{reviewAlgs.length} algorithms</div>
<div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
{reviewAlgs.map(alg=>(
<ReviewRow key={alg.id} alg={alg} learned={!!learned[alg.id]} ollPatterns={ollPatterns} onToggle={()=>{
persist({...learned,[alg.id]:!learned[alg.id]});
}} onEdit={alg.type==="OLL" ? ()=>{ setEditOllId(alg.id); setView("editOll"); } : null}/>
))}
</div>
{!reviewAlgs.length&&<div style={{textAlign:"center",color:"#374151",padding:"60px"}}>No matches</div>}
</div>
</div>
);
}

// ── HOME ──
return (
<div style={S.root}><Fonts/><div style={S.grid}/>
{toast&&<Toast {...toast}/>}
<div style={S.wrap}>
<div style={{textAlign:"center",marginBottom:"36px"}}>
<div style={{fontSize:"clamp(1.8rem,5vw,3rem)",fontWeight:900,letterSpacing:"-0.03em",background:"linear-gradient(135deg,#fff 0%,#a78bfa 50%,#38bdf8 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:"6px",lineHeight:1}}>⚡ CubeTrainer</div>
<div style={{color:"#475569",fontSize:"0.8rem",letterSpacing:"0.12em",textTransform:"uppercase"}}>OLL & PLL Mastery</div>
</div>

    <div style={{...S.card,marginBottom:"24px"}}>
      <div style={{display:"flex",justifyContent:"space-around",marginBottom:"18px",flexWrap:"wrap",gap:"12px"}}>
        <StatPill label="Total" value={`${learnedCount}/${ALL_ALGS.length}`} color="#a78bfa"/>
        <StatPill label="OLL" value={`${ollLearned}/${OLL_ALGS.length}`} color="#38bdf8"/>
        <StatPill label="PLL" value={`${pllLearned}/${PLL_ALGS.length}`} color="#34d399"/>
        <StatPill label="Diagrams" value={`${Object.values(ollPatterns).filter(p => p && p !== BLANK_PATTERN).length}/${OLL_ALGS.length}`} color="#fbbf24"/>
      </div>
      <div style={{height:"7px",borderRadius:"4px",background:"rgba(255,255,255,0.07)",overflow:"hidden"}}>
        <div style={{height:"100%",width:`${(learnedCount/ALL_ALGS.length)*100}%`,background:"linear-gradient(90deg,#a78bfa,#38bdf8)",borderRadius:"4px",transition:"width 0.6s"}}/>
      </div>
      <div style={{textAlign:"right",fontSize:"0.75rem",color:"#374151",marginTop:"5px"}}>{ALL_ALGS.length-learnedCount} remaining</div>
    </div>

    <div style={{display:"flex",gap:"8px",justifyContent:"center",marginBottom:"22px"}}>
      {["ALL","OLL","PLL"].map(f=>(
        <button key={f} onClick={()=>setFilter(f)} style={{
          ...S.btn(filter===f?"#a78bfa":"#475569"),
          background:filter===f?"rgba(167,139,250,0.18)":"rgba(255,255,255,0.03)",
          minWidth:"72px",
        }}>{f}</button>
      ))}
    </div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:"14px"}}>
      <ActionCard icon="📖" title="Learn" color="#a78bfa"
        desc={`Study the next 5 unlearned ${filter==="ALL"?"OLL/PLL":filter} algorithms with diagrams.`}
        onClick={startLearn}/>
      <ActionCard icon="⚡" title="Quiz" color="#38bdf8"
        desc="Test recall on algorithms you've marked as learned."
        onClick={startQuiz}/>
      <ActionCard icon="📚" title="Library" color="#34d399"
        desc="Browse all 78 algorithms. Toggle learned. Search by name or moves."
        onClick={()=>setView("review")}/>
      <ActionCard icon="✎" title="OLL Diagrams" color="#fbbf24"
        desc="Set up OLL diagram images by clicking stickers. Required for accurate OLL visuals."
        onClick={()=>{setReviewFilter("OLL");setView("review");}}/>
      {learnedCount>0&&<ActionCard icon="🗑" title="Reset" color="#f43f5e"
        desc="Clear progress and start from scratch."
        onClick={()=>{if(window.confirm("Reset all progress?")){persist({});persistPatterns({});}}}/>}
    </div>
  </div>
</div>

);
}

function ReviewRow({ alg, learned, onToggle, ollPatterns, onEdit }) {
const [open, setOpen] = useState(false);
const gc = GROUP_COLORS[alg.group]||"#64748b";
const needsPattern = alg.type === "OLL" && (!ollPatterns[alg.id] || ollPatterns[alg.id] === BLANK_PATTERN);
return (
<div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${learned?"rgba(34,197,94,0.2)":"rgba(255,255,255,0.06)"}`,borderRadius:"14px",overflow:"hidden"}}>
<div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",padding:"12px 16px",cursor:"pointer",gap:"12px"}}>
<div style={{width:"9px",height:"9px",borderRadius:"50%",background:learned?"#22c55e":"rgba(255,255,255,0.12)",flexShrink:0}}/>
<div style={{flex:1,minWidth:0}}>
<div style={{fontWeight:700,fontSize:"0.9rem"}}>{alg.name}</div>
<div style={{color:"#475569",fontSize:"0.75rem",marginTop:"2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{alg.alg}</div>
</div>
{needsPattern && <span style={{...S.tag("#fbbf24"),flexShrink:0}}>needs diagram</span>}
<span style={{...S.tag(gc),flexShrink:0}}>{alg.group}</span>
<span style={{...S.tag("#38bdf8"),flexShrink:0}}>{alg.type}</span>
<span style={{color:"#374151",fontSize:"0.75rem",flexShrink:0}}>{open?"▲":"▼"}</span>
</div>
{open&&(
<div style={{padding:"0 16px 16px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
<div style={{display:"flex",gap:"16px",alignItems:"flex-start",marginTop:"14px",flexWrap:"wrap"}}>
<div style={{background:"rgba(0,0,0,0.3)",borderRadius:"12px",padding:"10px",border:"1px solid rgba(255,255,255,0.06)",flexShrink:0}}>
<CubeDiagram alg={alg} size={100} ollPatterns={ollPatterns}/>
</div>
<div style={{flex:1,minWidth:"160px"}}>
<div style={{color:"#94a3b8",fontSize:"0.82rem",marginBottom:"12px",lineHeight:1.5}}>{alg.desc}</div>
<div style={{background:"rgba(0,0,0,0.2)",borderRadius:"10px",padding:"12px",marginBottom:"12px"}}>
<AlgDisplay alg={alg.alg}/>
</div>
<div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
<button onClick={e=>{e.stopPropagation();onToggle();}} style={{
background:learned?"rgba(244,63,94,0.1)":"rgba(34,197,94,0.1)",
border:`1px solid ${learned?"#f43f5e44":"#22c55e44"}`,
borderRadius:"8px",color:learned?"#f43f5e":"#22c55e",
padding:"7px 16px",cursor:"pointer",fontFamily:"'Syne',sans-serif",fontSize:"0.82rem",fontWeight:700,
}}>{learned?"✗ Mark unlearned":"✓ Mark learned"}</button>
{onEdit && <button onClick={e=>{e.stopPropagation();onEdit();}} style={{
background:"rgba(251,191,36,0.1)",
border:"1px solid #fbbf2444",
borderRadius:"8px",color:"#fbbf24",
padding:"7px 16px",cursor:"pointer",fontFamily:"'Syne',sans-serif",fontSize:"0.82rem",fontWeight:700,
}}>{needsPattern ? "✎ Set Diagram" : "✎ Edit Diagram"}</button>}
</div>
</div>
</div>
</div>
)}
</div>
);
}

function Fonts() {
return <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<SpeedcubingTrainer />);
</script>

</body>
</html>
